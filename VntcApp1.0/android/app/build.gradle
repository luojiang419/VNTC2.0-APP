plugins {
    id "com.google.protobuf" version "0.9.4"
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

protobuf {
    protoc {
        artifact = 'com.google.protobuf:protoc:3.20.1'
    }
    generateProtoTasks {
        all().configureEach { task ->
            task.builtins {
                java {
                    option "lite"
                }
            }
        }
    }
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "top.wherewego.vnt_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "top.wherewego.vnt_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
    sourceSets {
        main {
            // 主业务 Rust so 继续由 rust_builder/CargoKit 的 buildType sourceSet 注入，
            // 这里额外挂入内置远控控制端 so。
            jniLibs.srcDirs = ['src/main/rustdeskJniLibs']
            java.srcDirs += '../../vntcrustdesk-src/flutter/android/app/src/main/kotlin'
            proto.srcDirs += '../../vntcrustdesk-src/libs/hbb_common/protos'
            proto.includes += 'message.proto'
        }
    }
    packagingOptions {
        jniLibs {
            pickFirsts += ['**/libc++_shared.so']
            excludes += [
                'lib/armeabi-v7a/**',
                'lib/x86/**',
                'lib/x86_64/**'
            ]
        }
    }
}

dependencies {
    // 添加AndroidX核心库，确保FileProvider正常工作
    implementation 'androidx.core:core:1.12.0'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    implementation 'com.google.protobuf:protobuf-javalite:3.20.1'
    implementation 'androidx.media:media:1.6.0'
    implementation 'com.github.getActivity:XXPermissions:18.5'
    implementation 'com.caverock:androidsvg-aar:1.4'
}

flutter {
    source = "../.."
}
