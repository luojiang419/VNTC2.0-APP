name: VNT Multi Platform Build

on:
  push:
    branches:
      - main
      - flutter
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "手动指定版本号，例如 2.0.1"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CLIENT_APP_DIR: VntcApp1.0
  SERVER_PACKAGE_DIR: vnts2.0服务端开发包
  SERVER_SOURCE_DIR: vnts2.0服务端开发包/official-vnts-source-2.0.0
  SERVER_WINDOWS_DEPLOY_DIR: vnts2.0服务端开发包/windows-deploy
  SERVER_LINUX_DEPLOY_DIR: vnts2.0服务端开发包/linux-deploy
  CLIENT_FLUTTER_VERSION: 3.44.2
  CONSOLE_FLUTTER_VERSION: 3.44.2
  CLIENT_JAVA_VERSION: 17
  CLIENT_ANDROID_BUILD_TOOLS_VERSION: 36.0.0
  CLIENT_ANDROID_NDK_VERSION: 28.2.13676358
  RUST_VERSION: 1.88.0

jobs:
  meta:
    name: 准备版本信息
    runs-on: ubuntu-latest
    outputs:
      client_version: ${{ steps.versions.outputs.client_version }}
      client_build_number: ${{ steps.versions.outputs.client_build_number }}
      server_version: ${{ steps.versions.outputs.server_version }}
      release_version: ${{ steps.versions.outputs.release_version }}
      publish_release: ${{ steps.versions.outputs.publish_release }}
      signing_mode: ${{ steps.versions.outputs.signing_mode }}
    steps:
      - uses: actions/checkout@v4

      - name: 计算版本
        id: versions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SIGNING_MODE: ${{ vars.VNT_RELEASE_SIGNING_MODE || 'compatible' }}
        run: |
          set -euo pipefail

          input_version="${{ github.event.inputs.release_version || '' }}"
          client_pubspec_version="$(grep '^version:' "${CLIENT_APP_DIR}/pubspec.yaml" | awk '{print $2}' | cut -d+ -f1)"
          server_cargo_version="$(grep '^version = ' "${SERVER_SOURCE_DIR}/Cargo.toml" | head -1 | cut -d '"' -f2)"
          semver_pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
          signing_mode="${RELEASE_SIGNING_MODE,,}"
          if [[ "${signing_mode}" != "compatible" && "${signing_mode}" != "official" ]]; then
            echo "VNT_RELEASE_SIGNING_MODE 仅支持 compatible 或 official: ${RELEASE_SIGNING_MODE}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${input_version}" ]]; then
            release_version="${input_version}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if ! [[ "${client_pubspec_version}" =~ ${semver_pattern} ]]; then
              echo "客户端 pubspec 版本必须为三段式版本号: ${client_pubspec_version}" >&2
              exit 1
            fi

            latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || true)"
            latest_release_version="${latest_tag#v}"

            if [[ "${latest_release_version}" =~ ${semver_pattern} ]]; then
              highest_version="$(printf '%s\n%s\n' "${client_pubspec_version}" "${latest_release_version}" | sort -V | tail -n 1)"
              if [[ "${highest_version}" == "${latest_release_version}" ]]; then
                IFS='.' read -r version_major version_minor version_patch <<< "${latest_release_version}"
                version_patch=$((10#${version_patch} + 1))
                release_version="${version_major}.${version_minor}.${version_patch}"
              else
                release_version="${client_pubspec_version}"
              fi
            else
              release_version="${client_pubspec_version}"
            fi
          else
            release_version=""
          fi

          if [[ -n "${release_version}" ]]; then
            client_version="${release_version}"
            server_version="${release_version}"
            publish_release="true"
          else
            client_version="${client_pubspec_version}"
            server_version="${server_cargo_version}"
            publish_release="false"
          fi

          for version_name in client_version server_version; do
            version_value="${!version_name}"
            if ! [[ "${version_value}" =~ ${semver_pattern} ]]; then
              echo "版本号必须为三段式版本号: ${version_value}" >&2
              exit 1
            fi
          done

          IFS='.' read -r major minor patch <<< "${client_version}"
          build="${GITHUB_RUN_ATTEMPT:-1}"
          if (( 10#${minor} > 99 || 10#${patch} > 99 || 10#${build} > 99 )); then
            echo "版本号或运行重试次数超出 Android 构建号编码范围: ${client_version}+${build}" >&2
            exit 1
          fi
          client_build_number=$((10#${major} * 1000000 + 10#${minor} * 10000 + 10#${patch} * 100 + 10#${build}))

          echo "客户端版本: ${client_version}"
          echo "客户端构建号: ${client_build_number}"
          echo "服务端版本: ${server_version}"
          echo "是否发布: ${publish_release}"
          echo "签名策略: ${signing_mode}"

          echo "client_version=${client_version}" >> "${GITHUB_OUTPUT}"
          echo "client_build_number=${client_build_number}" >> "${GITHUB_OUTPUT}"
          echo "server_version=${server_version}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${publish_release}" >> "${GITHUB_OUTPUT}"
          echo "signing_mode=${signing_mode}" >> "${GITHUB_OUTPUT}"

  validate-release-signing:
    name: 校验发布签名策略
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: 验证发布签名策略与机密
        if: needs.meta.outputs.publish_release == 'true'
        shell: bash
        env:
          VNT_RELEASE_SIGNING_MODE: ${{ needs.meta.outputs.signing_mode }}
          VNT_ANDROID_OFFICIAL_KEYSTORE_BASE64: ${{ secrets.VNT_ANDROID_OFFICIAL_KEYSTORE_BASE64 }}
          VNT_ANDROID_OFFICIAL_KEYSTORE_PASSWORD_PLAIN: ${{ secrets.VNT_ANDROID_OFFICIAL_KEYSTORE_PASSWORD_PLAIN }}
          VNT_WINDOWS_SIGN_PFX_BASE64: ${{ secrets.VNT_WINDOWS_SIGN_PFX_BASE64 }}
          VNT_WINDOWS_SIGN_PFX_PASSWORD_PLAIN: ${{ secrets.VNT_WINDOWS_SIGN_PFX_PASSWORD_PLAIN }}
          VNT_WINDOWS_SIGN_SUBJECT_CONTAINS: ${{ secrets.VNT_WINDOWS_SIGN_SUBJECT_CONTAINS }}
          VNT_MACOS_SIGN_P12_BASE64: ${{ secrets.VNT_MACOS_SIGN_P12_BASE64 }}
          VNT_MACOS_SIGN_P12_PASSWORD_PLAIN: ${{ secrets.VNT_MACOS_SIGN_P12_PASSWORD_PLAIN }}
          VNT_MACOS_SIGN_IDENTITY: ${{ secrets.VNT_MACOS_SIGN_IDENTITY }}
          VNT_MACOS_NOTARY_APPLE_ID: ${{ secrets.VNT_MACOS_NOTARY_APPLE_ID }}
          VNT_MACOS_NOTARY_TEAM_ID: ${{ secrets.VNT_MACOS_NOTARY_TEAM_ID }}
          VNT_MACOS_NOTARY_APP_PASSWORD: ${{ secrets.VNT_MACOS_NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            VNT_ANDROID_OFFICIAL_KEYSTORE_BASE64 \
            VNT_ANDROID_OFFICIAL_KEYSTORE_PASSWORD_PLAIN; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ "${VNT_RELEASE_SIGNING_MODE}" == "official" ]]; then
            for name in \
              VNT_WINDOWS_SIGN_PFX_BASE64 \
              VNT_WINDOWS_SIGN_PFX_PASSWORD_PLAIN \
              VNT_WINDOWS_SIGN_SUBJECT_CONTAINS \
              VNT_MACOS_SIGN_P12_BASE64 \
              VNT_MACOS_SIGN_P12_PASSWORD_PLAIN \
              VNT_MACOS_SIGN_IDENTITY \
              VNT_MACOS_NOTARY_APPLE_ID \
              VNT_MACOS_NOTARY_TEAM_ID \
              VNT_MACOS_NOTARY_APP_PASSWORD; do
              if [[ -z "${!name:-}" ]]; then
                missing+=("$name")
              fi
            done
          fi

          if (( ${#missing[@]} > 0 )); then
            printf '签名策略 %s 缺少必要机密，已拒绝发布：\n' "${VNT_RELEASE_SIGNING_MODE}" >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

          if [[ "${VNT_RELEASE_SIGNING_MODE}" == "compatible" ]]; then
            echo "[OK] compatible：Android 固定正式证书，Windows 未签名，macOS app ad-hoc/DMG 未签名"
          else
            echo "[OK] official：Windows Authenticode + macOS Developer ID/notarization"
          fi

  build-client-windows:
    name: Windows 客户端安装版
    needs:
      - meta
      - validate-release-signing
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.CLIENT_FLUTTER_VERSION }}

      - name: 设置 Rust
        shell: bash
        run: |
          rustup set auto-self-update disable
          rustup toolchain install "${RUST_VERSION}"
          rustup default "${RUST_VERSION}"
          rustup component add rust-src --toolchain "${RUST_VERSION}"
          rustc -V

      - name: 恢复 Windows 远程协助运行时
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          & "$env:GITHUB_WORKSPACE/VntcApp1.0/scripts/restore_vntcrustdesk_artifact_from_release.ps1" `
            -Repository "$env:GITHUB_REPOSITORY"

      - name: 判断是否已应用 Windows 7 引擎
        id: win7_engine
        shell: pwsh
        run: |
          $flag = "C:/hostedtoolcache/windows/flutter/stable-${{ env.CLIENT_FLUTTER_VERSION }}-x64/.win7_engine_applied"
          if (Test-Path $flag) {
            "applied=true" >> $Env:GITHUB_OUTPUT
          } else {
            "applied=false" >> $Env:GITHUB_OUTPUT
          }

      - name: 替换 Flutter 引擎为支持 Windows 7 的版本
        if: steps.win7_engine.outputs.applied != 'true'
        shell: pwsh
        run: |
          flutter doctor -v
          flutter precache --windows

          $archive = Join-Path $Env:GITHUB_WORKSPACE "VntcApp1.0/.github/patches/windows-x64-release.zip"
          if (Test-Path $archive) {
            Expand-Archive -Path $archive -DestinationPath "windows-x64-release" -Force
            Copy-Item -Path "windows-x64-release/*" -Destination "C:/hostedtoolcache/windows/flutter/stable-${{ env.CLIENT_FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/" -Recurse -Force
            New-Item -ItemType File -Path "C:/hostedtoolcache/windows/flutter/stable-${{ env.CLIENT_FLUTTER_VERSION }}-x64/.win7_engine_applied" -Force | Out-Null
          } else {
            Write-Host "未找到 Windows 7 引擎补丁包，跳过引擎替换: $archive"
          }

      - name: 构建 Windows 安装版客户端
        shell: pwsh
        working-directory: VntcApp1.0
        env:
          VNT_REQUIRE_OFFICIAL_SIGNING: ${{ needs.meta.outputs.signing_mode == 'official' && '1' || '0' }}
          VNT_WINDOWS_SIGN_PFX_BASE64: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_WINDOWS_SIGN_PFX_BASE64 || '' }}
          VNT_WINDOWS_SIGN_PFX_PASSWORD_PLAIN: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_WINDOWS_SIGN_PFX_PASSWORD_PLAIN || '' }}
          VNT_WINDOWS_SIGN_SUBJECT_CONTAINS: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_WINDOWS_SIGN_SUBJECT_CONTAINS || '' }}
          VNT_WINDOWS_SIGN_TIMESTAMP_URL: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_WINDOWS_SIGN_TIMESTAMP_URL || '' }}
          APP_UPDATE_WINDOWS_TRUSTED_PUBLISHER: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_WINDOWS_SIGN_SUBJECT_CONTAINS || '' }}
        run: |
          .\scripts\export_installer_package.ps1 `
            -Version '${{ needs.meta.outputs.client_version }}' `
            -SkipVersionAdvance

      - name: 校验 Windows 客户端签名结果
        shell: pwsh
        env:
          VNT_RELEASE_SIGNING_MODE: ${{ needs.meta.outputs.signing_mode }}
          VNT_WINDOWS_SIGN_SUBJECT_CONTAINS: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_WINDOWS_SIGN_SUBJECT_CONTAINS || '' }}
        run: |
          $version = '${{ needs.meta.outputs.client_version }}'
          $setupPath = Join-Path $Env:GITHUB_WORKSPACE "VntcApp1.0/release/installer/VNT_App_${version}_Windows_Setup.exe"
          if (-not (Test-Path -LiteralPath $setupPath -PathType Leaf)) {
            throw "Windows installer missing before signature verification: $setupPath"
          }

          $signature = Get-AuthenticodeSignature -LiteralPath $setupPath
          $status = [string]$signature.Status
          $subject = if ($signature.SignerCertificate) { [string]$signature.SignerCertificate.Subject } else { '' }
          if ($Env:VNT_RELEASE_SIGNING_MODE -eq 'official') {
            if ($status -ne 'Valid') {
              throw "Official Windows Authenticode status is not Valid: $status"
            }
            if ([string]::IsNullOrWhiteSpace($Env:VNT_WINDOWS_SIGN_SUBJECT_CONTAINS) -or
                $subject -notlike "*$($Env:VNT_WINDOWS_SIGN_SUBJECT_CONTAINS)*") {
              throw "Official Windows signer subject mismatch: $subject"
            }
          } elseif ($status -ne 'NotSigned') {
            throw "Compatible mode requires the established NotSigned Windows baseline, got: $status"
          }

          $reportPath = Join-Path (Split-Path -Parent $setupPath) "VNT_App_${version}_Windows_Setup.signature.json"
          [ordered]@{
            platform = 'windows'
            signingMode = $Env:VNT_RELEASE_SIGNING_MODE
            authenticodeStatus = $status
            signerSubject = $subject
            sha256 = (Get-FileHash -LiteralPath $setupPath -Algorithm SHA256).Hash.ToLowerInvariant()
          } | ConvertTo-Json | Set-Content -LiteralPath $reportPath -Encoding UTF8
          Write-Host "[OK] Windows signature policy: $status"

      - name: 上传 Windows 客户端产物
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: |
            VntcApp1.0/release/installer/VNT_App_${{ needs.meta.outputs.client_version }}_Windows_Setup.exe
            VntcApp1.0/release/installer/VNT_App_${{ needs.meta.outputs.client_version }}_Windows_Setup.sha256
            VntcApp1.0/release/installer/VNT_App_${{ needs.meta.outputs.client_version }}_Windows_Setup.signature.json
            VntcApp1.0/third_party/vntcrustdesk/windows/dist/vntcrustdesk.msi
            VntcApp1.0/third_party/vntcrustdesk/windows/vntcrustdesk.msi.sha256
          if-no-files-found: error

  build-client-macos:
    name: macOS 客户端
    needs:
      - meta
      - validate-release-signing
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.CLIENT_FLUTTER_VERSION }}

      - name: 设置 Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup set auto-self-update disable
          rustup toolchain install "${RUST_VERSION}"
          rustup default "${RUST_VERSION}"
          rustup component add rust-src --toolchain "${RUST_VERSION}"
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
          rustc -V

      - name: 修复 tun-rs 代码
        shell: bash
        working-directory: VntcApp1.0
        run: |
          set -euo pipefail
          cd rust
          cargo fetch || true
          cd ..

          TUN_FILE="vendor/tun-rs-2.5.7/src/platform/macos/tap/mod.rs"
          if [ ! -f "$TUN_FILE" ]; then
            TUN_FILE="$(find ~/.cargo/registry/src -name "mod.rs" -path "*/tun-rs-*/src/platform/macos/tap/mod.rs" 2>/dev/null | head -1)"
          fi
          if [ -n "$TUN_FILE" ] && [ -f "$TUN_FILE" ]; then
            python3 - "$TUN_FILE" <<'PY'
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          text = path.read_text()
          line = "use std::mem::size_of;"
          if line not in text:
              marker = "use std::io::{IoSlice, IoSliceMut};"
              text = text.replace(marker, f"{marker}\n{line}", 1)
              path.write_text(text)
          PY
          fi

      - name: 构建 macOS 客户端
        shell: bash
        working-directory: VntcApp1.0
        env:
          VNT_REQUIRE_OFFICIAL_SIGNING: ${{ needs.meta.outputs.signing_mode == 'official' && '1' || '0' }}
          VNT_MACOS_SIGN_P12_BASE64: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_MACOS_SIGN_P12_BASE64 || '' }}
          VNT_MACOS_SIGN_P12_PASSWORD_PLAIN: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_MACOS_SIGN_P12_PASSWORD_PLAIN || '' }}
          VNT_MACOS_SIGN_IDENTITY: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_MACOS_SIGN_IDENTITY || '' }}
          VNT_MACOS_NOTARY_APPLE_ID: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_MACOS_NOTARY_APPLE_ID || '' }}
          VNT_MACOS_NOTARY_TEAM_ID: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_MACOS_NOTARY_TEAM_ID || '' }}
          VNT_MACOS_NOTARY_APP_PASSWORD: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_MACOS_NOTARY_APP_PASSWORD || '' }}
        run: |
          set -euo pipefail
          flutter config --no-enable-swift-package-manager
          flutter pub get

          python3 - <<'PY'
          import os
          import shutil
          from pathlib import Path

          candidates = []
          if os.environ.get("PUB_CACHE"):
              candidates.append(Path(os.environ["PUB_CACHE"]))
          candidates.append(Path.home() / ".pub-cache")
          flutter_bin = shutil.which("flutter")
          if flutter_bin:
              candidates.append(Path(flutter_bin).resolve().parents[1] / ".pub-cache")

          header_glob = "hosted/pub.dev/video_player_avfoundation-*/darwin/video_player_avfoundation/Sources/video_player_avfoundation_objc/include/video_player_avfoundation_objc/FVPViewProvider.h"
          for pub_cache in dict.fromkeys(candidates):
              for header in pub_cache.glob(header_glob):
                  text = header.read_text()
                  if "#import <TargetConditionals.h>" not in text:
                      header.write_text(text.replace("#if TARGET_OS_OSX", "#import <TargetConditionals.h>\n\n#if TARGET_OS_OSX", 1))
          PY
          bash ./scripts/export_macos_package.sh \
            --dmg \
            --version "${{ needs.meta.outputs.client_version }}" \
            --build-number "${{ needs.meta.outputs.client_build_number }}"

      - name: 校验 macOS 客户端签名结果
        shell: bash
        working-directory: VntcApp1.0
        env:
          VNT_RELEASE_SIGNING_MODE: ${{ needs.meta.outputs.signing_mode }}
          VNT_MACOS_SIGN_IDENTITY: ${{ needs.meta.outputs.signing_mode == 'official' && secrets.VNT_MACOS_SIGN_IDENTITY || '' }}
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.client_version }}"
          app_path="dist/vnt_app.app"
          dmg_path="dist/VNT_App_${version}_macOS.dmg"
          report_path="dist/VNT_App_${version}_macOS.signature.json"

          test -d "$app_path"
          test -f "$dmg_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          app_details="$(codesign -dv --verbose=4 "$app_path" 2>&1)"

          if [[ "${VNT_RELEASE_SIGNING_MODE}" == "official" ]]; then
            codesign --verify --strict --verbose=2 "$dmg_path"
            xcrun stapler validate "$dmg_path"
            if [[ -z "${VNT_MACOS_SIGN_IDENTITY}" ]] || ! grep -F "Authority=${VNT_MACOS_SIGN_IDENTITY}" <<< "$app_details" >/dev/null; then
              echo "macOS Developer ID signing identity mismatch" >&2
              exit 1
            fi
            signature_kind="developer-id-notarized"
          else
            if ! grep -E '^Signature=(adhoc|adhoc\s*)$' <<< "$app_details" >/dev/null; then
              echo "Compatible mode requires the established ad-hoc app signature" >&2
              printf '%s\n' "$app_details" >&2
              exit 1
            fi
            if codesign --verify "$dmg_path" >/dev/null 2>&1; then
              echo "Compatible mode requires the established unsigned DMG baseline" >&2
              exit 1
            fi
            signature_kind="ad-hoc-app-unsigned-dmg"
          fi

          export VNT_MACOS_SIGNATURE_KIND="$signature_kind"
          export VNT_MACOS_DMG_SHA256="$(shasum -a 256 "$dmg_path" | awk '{print $1}')"
          python3 - "$report_path" <<'PY'
          import json
          import os
          import sys

          report = {
              "platform": "macos",
              "signingMode": os.environ["VNT_RELEASE_SIGNING_MODE"],
              "signatureKind": os.environ["VNT_MACOS_SIGNATURE_KIND"],
              "signerIdentity": os.environ.get("VNT_MACOS_SIGN_IDENTITY", ""),
              "sha256": os.environ["VNT_MACOS_DMG_SHA256"],
          }
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2)
          PY
          echo "[OK] macOS signature policy: $signature_kind"

      - name: 上传 macOS 客户端产物
        uses: actions/upload-artifact@v4
        with:
          name: client-macos
          path: |
            VntcApp1.0/dist/VNT_App_${{ needs.meta.outputs.client_version }}_macOS.dmg
            VntcApp1.0/dist/VNT_App_${{ needs.meta.outputs.client_version }}_macOS.dmg.sha256
            VntcApp1.0/dist/VNT_App_${{ needs.meta.outputs.client_version }}_macOS.signature.json
          if-no-files-found: error

  build-client-android:
    name: Android 客户端
    needs:
      - meta
      - validate-release-signing
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.CLIENT_JAVA_VERSION }}

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android 构建组件
        shell: pwsh
        run: |
          sdkmanager --install `
            "platform-tools" `
            "build-tools;${Env:CLIENT_ANDROID_BUILD_TOOLS_VERSION}" `
            "ndk;${Env:CLIENT_ANDROID_NDK_VERSION}"

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.CLIENT_FLUTTER_VERSION }}

      - name: 设置 Rust
        shell: pwsh
        run: |
          rustup set auto-self-update disable
          rustup toolchain install "${Env:RUST_VERSION}"
          rustup default "${Env:RUST_VERSION}"
          rustup target add aarch64-linux-android
          rustc -V

      - name: 验证 Android 正式签名机密
        if: needs.meta.outputs.publish_release == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ secrets.VNT_ANDROID_OFFICIAL_KEYSTORE_BASE64 }}')) {
            throw '缺少 GitHub Secret: VNT_ANDROID_OFFICIAL_KEYSTORE_BASE64'
          }
          if ([string]::IsNullOrWhiteSpace('${{ secrets.VNT_ANDROID_OFFICIAL_KEYSTORE_PASSWORD_PLAIN }}')) {
            throw '缺少 GitHub Secret: VNT_ANDROID_OFFICIAL_KEYSTORE_PASSWORD_PLAIN'
          }

      - name: 构建未签名 Android APK
        shell: pwsh
        working-directory: VntcApp1.0
        run: |
          flutter pub get
          flutter build apk --release `
            --target-platform android-arm64 `
            --build-name "${{ needs.meta.outputs.client_version }}" `
            --build-number "${{ needs.meta.outputs.client_build_number }}" `
            "--dart-define=APP_BASE_TITLE=VNTC APP2.0" `
            "--dart-define=APP_BUILD_VERSION=${{ needs.meta.outputs.client_version }}" `
            "--dart-define=APP_DISPLAY_VERSION=v${{ needs.meta.outputs.client_version }}" `
            "--dart-define=APP_PRODUCT_NAME=VNTC APP2.0" `
            "--dart-define=APP_WINDOW_TITLE=VNTC APP2.0 v${{ needs.meta.outputs.client_version }}"

      - name: 导出正式 Android 客户端
        shell: pwsh
        working-directory: VntcApp1.0
        env:
          VNT_ANDROID_OFFICIAL_KEYSTORE_BASE64: ${{ secrets.VNT_ANDROID_OFFICIAL_KEYSTORE_BASE64 }}
          VNT_ANDROID_OFFICIAL_KEYSTORE_PASSWORD_PLAIN: ${{ secrets.VNT_ANDROID_OFFICIAL_KEYSTORE_PASSWORD_PLAIN }}
        run: |
          .\scripts\export_android_brand_package.ps1 `
            -Version '${{ needs.meta.outputs.client_version }}'

      - name: 整理 Android 客户端发布文件
        shell: pwsh
        working-directory: VntcApp1.0
        run: |
          $artifactDir = Join-Path $Env:GITHUB_WORKSPACE 'artifacts'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $sourceApk = Join-Path (Get-Location) 'release\android\VNT_App_${{ needs.meta.outputs.client_version }}_Android_arm64_Brand_Master.apk'
          $targetName = 'VNT_App_${{ needs.meta.outputs.client_version }}_Android_arm64.apk'
          $targetApk = Join-Path $artifactDir $targetName

          Copy-Item -LiteralPath $sourceApk -Destination $targetApk -Force

          $hash = (Get-FileHash -LiteralPath $targetApk -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath "$targetApk.sha256" -Value "$hash  $targetName" -Encoding Ascii

          $apksigner = Join-Path $Env:ANDROID_HOME "build-tools\$($Env:CLIENT_ANDROID_BUILD_TOOLS_VERSION)\apksigner.bat"
          if (-not (Test-Path -LiteralPath $apksigner -PathType Leaf)) {
            throw "apksigner missing: $apksigner"
          }
          $signatureOutput = @(& $apksigner verify --verbose --print-certs $targetApk 2>&1)
          if ($LASTEXITCODE -ne 0) {
            throw "Android APK signature verification failed: $($signatureOutput -join [Environment]::NewLine)"
          }
          $certificateMatches = [regex]::Matches(
            ($signatureOutput | Out-String),
            'Signer #\d+ certificate SHA-256 digest:\s*([0-9A-Fa-f:]{64,95})'
          )
          if ($certificateMatches.Count -ne 1) {
            throw "Android APK must contain exactly one recognized signer, got $($certificateMatches.Count)"
          }
          $actualCertificate = $certificateMatches[0].Groups[1].Value.Replace(':', '').ToUpperInvariant()
          $trustPath = Join-Path (Get-Location) 'config\android_official_signing_trust.json'
          $expectedCertificate = [string]((Get-Content -LiteralPath $trustPath -Raw -Encoding UTF8 | ConvertFrom-Json).certificateSha256)
          if ($actualCertificate -cne $expectedCertificate) {
            throw "Android official certificate mismatch. Expected $expectedCertificate, got $actualCertificate"
          }

          $reportPath = Join-Path $artifactDir 'VNT_App_${{ needs.meta.outputs.client_version }}_Android_arm64.signature.json'
          [ordered]@{
            platform = 'android'
            signingMode = 'official-fixed-certificate'
            certificateSha256 = $actualCertificate
            sha256 = $hash
          } | ConvertTo-Json | Set-Content -LiteralPath $reportPath -Encoding UTF8
          Write-Host "[OK] Android official certificate: $actualCertificate"

      - name: 上传 Android 客户端产物
        uses: actions/upload-artifact@v4
        with:
          name: client-android
          path: |
            artifacts/VNT_App_${{ needs.meta.outputs.client_version }}_Android_arm64.apk
            artifacts/VNT_App_${{ needs.meta.outputs.client_version }}_Android_arm64.apk.sha256
            artifacts/VNT_App_${{ needs.meta.outputs.client_version }}_Android_arm64.signature.json
          if-no-files-found: error

  build-server-windows-light:
    name: Windows 服务端轻量版
    needs:
      - meta
      - validate-release-signing
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Rust
        shell: pwsh
        run: |
          rustup set auto-self-update disable
          rustup toolchain install "${Env:RUST_VERSION}"
          rustup default "${Env:RUST_VERSION}"
          rustc -V

      - name: 构建服务端二进制
        shell: pwsh
        run: |
          $targetDir = Join-Path $Env:RUNNER_TEMP 'vnts2-windows-light-target'
          "SERVER_WINDOWS_TARGET_DIR=$targetDir" >> $Env:GITHUB_ENV
          cargo build `
            --manifest-path '.\vnts2.0服务端开发包\official-vnts-source-2.0.0\Cargo.toml' `
            --release `
            --locked
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}\vnts2-windows-light-target

      - name: 构建轻量原生管理器
        shell: pwsh
        run: |
          & '.\vnts2.0服务端开发包\windows-deploy\build-vnts2-manager-exe.ps1'

      - name: 生成轻量版发布包
        shell: pwsh
        run: |
          & '.\vnts2.0服务端开发包\windows-deploy\build-vnts2-windows-package.ps1' `
            -SourceExecutable (Join-Path $Env:SERVER_WINDOWS_TARGET_DIR 'release\vnts2.exe') `
            -Version '${{ needs.meta.outputs.server_version }}'

      - name: 上传轻量版服务端产物
        uses: actions/upload-artifact@v4
        with:
          name: server-windows-light
          path: |
            vnts2.0服务端开发包/windows-deploy/dist/vnts2-${{ needs.meta.outputs.server_version }}-windows-x64.zip
            vnts2.0服务端开发包/windows-deploy/dist/vnts2-${{ needs.meta.outputs.server_version }}-windows-x64.zip.sha256
          if-no-files-found: error

  build-server-windows-console:
    name: Windows 服务端增强版
    needs:
      - meta
      - validate-release-signing
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.CONSOLE_FLUTTER_VERSION }}

      - name: 设置 Rust
        shell: pwsh
        run: |
          rustup set auto-self-update disable
          rustup toolchain install "${Env:RUST_VERSION}"
          rustup default "${Env:RUST_VERSION}"
          rustc -V

      - name: 构建服务端二进制
        shell: pwsh
        run: |
          $targetDir = Join-Path $Env:RUNNER_TEMP 'vnts2-windows-console-target'
          "SERVER_WINDOWS_TARGET_DIR=$targetDir" >> $Env:GITHUB_ENV
          cargo build `
            --manifest-path '.\vnts2.0服务端开发包\official-vnts-source-2.0.0\Cargo.toml' `
            --release `
            --locked
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}\vnts2-windows-console-target

      - name: 生成增强版发布包
        shell: pwsh
        run: |
          & '.\vnts2.0服务端开发包\windows-deploy\build-vnts2-console-package.ps1' `
            -SourceExecutable (Join-Path $Env:SERVER_WINDOWS_TARGET_DIR 'release\vnts2.exe') `
            -Version '${{ needs.meta.outputs.server_version }}' `
            -FlutterExecutable 'flutter'

      - name: 上传增强版服务端产物
        uses: actions/upload-artifact@v4
        with:
          name: server-windows-console
          path: |
            vnts2.0服务端开发包/windows-deploy/dist/vnts2-console-${{ needs.meta.outputs.server_version }}-windows-x64.zip
            vnts2.0服务端开发包/windows-deploy/dist/vnts2-console-${{ needs.meta.outputs.server_version }}-windows-x64.zip.sha256
          if-no-files-found: error

  build-server-linux:
    name: Linux 服务端
    needs:
      - meta
      - validate-release-signing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup set auto-self-update disable
          rustup toolchain install "${RUST_VERSION}"
          rustup default "${RUST_VERSION}"
          rustc -V

      - name: 生成 Linux 发布包
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "${SERVER_LINUX_DEPLOY_DIR}/build-vnts2-linux-package.sh"
          VNTS2_VERSION="${{ needs.meta.outputs.server_version }}" "${SERVER_LINUX_DEPLOY_DIR}/build-vnts2-linux-package.sh"

      - name: 上传 Linux 服务端产物
        uses: actions/upload-artifact@v4
        with:
          name: server-linux
          path: |
            vnts2.0服务端开发包/dist/vnts2-${{ needs.meta.outputs.server_version }}-linux-x86_64.tar.gz
            vnts2.0服务端开发包/dist/vnts2-${{ needs.meta.outputs.server_version }}-linux-x86_64.tar.gz.sha256
          if-no-files-found: error

  deploy:
    name: 发布 GitHub Release
    if: needs.meta.outputs.publish_release == 'true'
    needs:
      - meta
      - build-client-windows
      - build-client-macos
      - build-client-android
      - build-server-windows-light
      - build-server-windows-console
      - build-server-linux
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 汇总发布文件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find ./artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/$(basename "$file")"
          done

          cd release-assets
          sha256sum * > SHA256SUMS.txt
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone

          repo = os.environ["GITHUB_REPOSITORY"]
          version = os.environ["RELEASE_VERSION"]
          signing_mode = os.environ["SIGNING_MODE"]
          tag = f"v{version}"

          def platform_for(name: str) -> str:
              lower = name.lower()
              if lower.endswith(".apk"):
                  return "android"
              if lower.endswith(".dmg"):
                  return "macos"
              if lower.endswith(".tar.gz"):
                  return "linux"
              if lower.endswith(".exe") or lower.endswith(".msi"):
                  return "windows"
              if lower.endswith(".zip"):
                  return "windows"
              return "unknown"

          assets = []
          for name in sorted(os.listdir(".")):
              if name in {"SHA256SUMS.txt", "latest.json"}:
                  continue
              if not os.path.isfile(name):
                  continue
              with open(name, "rb") as handle:
                  sha256 = hashlib.sha256(handle.read()).hexdigest()
              assets.append(
                  {
                      "name": name,
                      "platform": platform_for(name),
                      "size": os.path.getsize(name),
                      "sha256": sha256,
                      "download_url": f"https://github.com/{repo}/releases/download/{tag}/{name}",
                  }
              )

          manifest = {
              "version": version,
              "tag": tag,
              "signing_mode": signing_mode,
              "published_at": datetime.now(timezone.utc).isoformat(),
              "release_url": f"https://github.com/{repo}/releases/tag/{tag}",
              "assets": assets,
          }
          with open("latest.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, ensure_ascii=False, indent=2)
          PY
        env:
          RELEASE_VERSION: ${{ needs.meta.outputs.release_version }}
          SIGNING_MODE: ${{ needs.meta.outputs.signing_mode }}

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.meta.outputs.release_version }}
          target_commitish: ${{ github.sha }}
          name: VNT Suite v${{ needs.meta.outputs.release_version }}
          body: |
            自动构建发布：

            签名策略：`${{ needs.meta.outputs.signing_mode }}`。每个平台的签名状态与 SHA-256 见同名 `.signature.json` 和 `.sha256` 文件。

            - Windows 客户端安装版
            - macOS 客户端
            - Android 客户端
            - Windows 服务端轻量版
            - Windows 服务端增强版
            - Linux 服务端
          files: release-assets/*
          prerelease: ${{ contains(needs.meta.outputs.release_version, 'test') || contains(needs.meta.outputs.release_version, 'beta') || contains(needs.meta.outputs.release_version, 'rc') }}
