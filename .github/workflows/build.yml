  deploy:
    name: 发布 GitHub Release
    if: needs.meta.outputs.publish_release == 'true'
    needs:
      - meta
      - test-client
      - build-client-windows
      - build-client-macos
      - build-client-android
      - build-server-windows-light
      - build-server-windows-console
      - build-server-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 汇总发布文件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find ./artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/$(basename "$file")"
          done

          cd release-assets
          sha256sum * > SHA256SUMS.txt
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone

          repo = os.environ["GITHUB_REPOSITORY"]
          version = os.environ["RELEASE_VERSION"]
          signing_mode = os.environ["SIGNING_MODE"]
          tag = f"v{version}"

          def platform_for(name: str) -> str:
              lower = name.lower()
              if lower.endswith(".apk"):
                  return "android"
              if lower.endswith(".dmg"):
                  return "macos"
              if lower.endswith(".tar.gz"):
                  return "linux"
              if lower.endswith(".exe") or lower.endswith(".msi"):
                  return "windows"
              if lower.endswith(".zip"):
                  return "windows"
              return "unknown"

          assets = []
          for name in sorted(os.listdir(".")):
              if name in {"SHA256SUMS.txt", "latest.json"}:
                  continue
              if not os.path.isfile(name):
                  continue
              with open(name, "rb") as handle:
                  sha256 = hashlib.sha256(handle.read()).hexdigest()
              assets.append(
                  {
                      "name": name,
                      "platform": platform_for(name),
                      "size": os.path.getsize(name),
                      "sha256": sha256,
                      "download_url": f"https://github.com/{repo}/releases/download/{tag}/{name}",
                  }
              )

          manifest = {
              "version": version,
              "tag": tag,
              "signing_mode": signing_mode,
              "published_at": datetime.now(timezone.utc).isoformat(),
              "release_url": f"https://github.com/{repo}/releases/tag/{tag}",
              "assets": assets,
          }
          with open("latest.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, ensure_ascii=False, indent=2)
          PY
        env:
          RELEASE_VERSION: ${{ needs.meta.outputs.release_version }}
          SIGNING_MODE: ${{ needs.meta.outputs.signing_mode }}

      - name: 创建草稿 Release 并上传资产
        id: create_draft_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ needs.meta.outputs.release_version }}
          target_commitish: ${{ github.sha }}
          name: VNT Suite v${{ needs.meta.outputs.release_version }}
          body: |
            自动构建发布：

            签名策略：`${{ needs.meta.outputs.signing_mode }}`。每个平台的签名状态与 SHA-256 见同名 `.signature.json` 和 `.sha256` 文件。

            - Windows 客户端安装版
            - macOS 客户端
            - Android 客户端
            - Windows 服务端轻量版
            - Windows 服务端增强版
            - Linux 服务端
          files: release-assets/*
          draft: true
          prerelease: false
          fail_on_unmatched_files: true

      - name: 远端复核草稿 Release 资产
        id: verify_draft_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.meta.outputs.release_version }}
        run: |
          set -euo pipefail
          tag="v${RELEASE_VERSION}"
          release_json="${RUNNER_TEMP}/draft-release.json"
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" > "${release_json}"

          RELEASE_JSON="${release_json}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          release = json.loads(Path(os.environ["RELEASE_JSON"]).read_text(encoding="utf-8"))
          expected_tag = f"v{os.environ['RELEASE_VERSION']}"
          expected_sha = os.environ["GITHUB_SHA"]
          if release.get("tag_name") != expected_tag:
              raise SystemExit(f"draft tag mismatch: {release.get('tag_name')} != {expected_tag}")
          if release.get("target_commitish") != expected_sha:
              raise SystemExit(
                  f"draft target mismatch: {release.get('target_commitish')} != {expected_sha}"
              )
          if release.get("draft") is not True or release.get("prerelease") is not False:
              raise SystemExit("release must remain a non-prerelease draft during verification")

          expected = {
              path.name: path
              for path in Path("release-assets").iterdir()
              if path.is_file()
          }
          assets = release.get("assets") or []
          actual = {asset["name"]: asset for asset in assets}
          if len(actual) != len(assets):
              raise SystemExit("draft contains duplicate asset names")
          if set(actual) != set(expected):
              raise SystemExit(
                  f"draft asset set mismatch: missing={sorted(set(expected) - set(actual))}, "
                  f"unexpected={sorted(set(actual) - set(expected))}"
              )

          for name, path in expected.items():
              data = path.read_bytes()
              digest = hashlib.sha256(data).hexdigest()
              asset = actual[name]
              if asset.get("state") != "uploaded":
                  raise SystemExit(f"asset is not uploaded: {name}")
              if asset.get("size") != len(data):
                  raise SystemExit(f"asset size mismatch: {name}")
              remote_digest = asset.get("digest")
              if remote_digest and remote_digest != f"sha256:{digest}":
                  raise SystemExit(f"asset digest mismatch: {name}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"release_id={release['id']}\n")
          print(f"[OK] verified draft release {release['id']} with {len(expected)} assets")
          PY

      - name: 将已验收草稿转为正式 Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.verify_draft_release.outputs.release_id }}
        run: |
          set -euo pipefail
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false \
            -F prerelease=false >/dev/null

      - name: 验收 Latest Release、标签与校验文件
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.meta.outputs.release_version }}
        run: |
          set -euo pipefail
          tag="v${RELEASE_VERSION}"
          latest_json="${RUNNER_TEMP}/latest-release.json"
          gh api "repos/${GITHUB_REPOSITORY}/releases/latest" > "${latest_json}"

          LATEST_JSON="${latest_json}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          release = json.loads(Path(os.environ["LATEST_JSON"]).read_text(encoding="utf-8"))
          expected_tag = f"v{os.environ['RELEASE_VERSION']}"
          expected_sha = os.environ["GITHUB_SHA"]
          if release.get("tag_name") != expected_tag:
              raise SystemExit(f"latest tag mismatch: {release.get('tag_name')} != {expected_tag}")
          if release.get("target_commitish") != expected_sha:
              raise SystemExit(
                  f"latest target mismatch: {release.get('target_commitish')} != {expected_sha}"
              )
          if release.get("draft") is not False or release.get("prerelease") is not False:
              raise SystemExit("latest release is not a stable public release")

          expected = {
              path.name: path
              for path in Path("release-assets").iterdir()
              if path.is_file()
          }
          assets = release.get("assets") or []
          actual = {asset["name"]: asset for asset in assets}
          if len(actual) != len(assets) or set(actual) != set(expected):
              raise SystemExit("latest release asset set does not match local verified assets")
          for name, path in expected.items():
              data = path.read_bytes()
              digest = hashlib.sha256(data).hexdigest()
              asset = actual[name]
              if asset.get("state") != "uploaded" or asset.get("size") != len(data):
                  raise SystemExit(f"latest asset state/size mismatch: {name}")
              remote_digest = asset.get("digest")
              if remote_digest and remote_digest != f"sha256:{digest}":
                  raise SystemExit(f"latest asset digest mismatch: {name}")
          print(f"[OK] latest release contains {len(expected)} verified assets")
          PY

          tag_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq '.object.type')"
          tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq '.object.sha')"
          if [[ "${tag_type}" == "tag" ]]; then
            tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.object.sha')"
          fi
          if [[ "${tag_sha}" != "${GITHUB_SHA}" ]]; then
            echo "正式标签未指向当前提交: ${tag_sha} != ${GITHUB_SHA}" >&2
            exit 1
          fi

          checksum_url="$(jq -r '.assets[] | select(.name == "SHA256SUMS.txt") | .browser_download_url' "${latest_json}")"
          if [[ -z "${checksum_url}" || "${checksum_url}" == "null" ]]; then
            echo "Latest Release 缺少 SHA256SUMS.txt" >&2
            exit 1
          fi
          curl --fail --location --retry 3 --silent --show-error \
            "${checksum_url}" --output "${RUNNER_TEMP}/remote-SHA256SUMS.txt"
          cmp release-assets/SHA256SUMS.txt "${RUNNER_TEMP}/remote-SHA256SUMS.txt"
          echo "[OK] Latest Release、标签和远端 SHA256SUMS.txt 验收通过"

      - name: 清理当前运行创建的失败草稿
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.meta.outputs.release_version }}
        run: |
          set -euo pipefail
          tag="v${RELEASE_VERSION}"
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" 2>/dev/null || true)"
          if [[ -z "${release_json}" ]]; then
            exit 0
          fi

          release_id="$(jq -r '.id' <<< "${release_json}")"
          is_draft="$(jq -r '.draft' <<< "${release_json}")"
          target="$(jq -r '.target_commitish' <<< "${release_json}")"
          if [[ "${is_draft}" != "true" || "${target}" != "${GITHUB_SHA}" ]]; then
            echo "保留非本次运行草稿或已经正式发布的 Release: ${tag}"
            exit 0
          fi

          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" 2>/dev/null || true)"
          if [[ -z "${ref_json}" ]]; then
            exit 0
          fi
          tag_type="$(jq -r '.object.type' <<< "${ref_json}")"
          tag_sha="$(jq -r '.object.sha' <<< "${ref_json}")"
          if [[ "${tag_type}" == "tag" ]]; then
            tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.object.sha')"
          fi
          if [[ "${tag_sha}" == "${GITHUB_SHA}" ]]; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag}"
          fi
