name: VNT Multi Platform Build

on:
  push:
    branches:
      - main
      - flutter
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "手动指定版本号，例如 2.0.1"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CLIENT_APP_DIR: VntcApp1.0
  SERVER_PACKAGE_DIR: vnts2.0服务端开发包
  SERVER_SOURCE_DIR: vnts2.0服务端开发包/official-vnts-source-2.0.0
  SERVER_WINDOWS_DEPLOY_DIR: vnts2.0服务端开发包/windows-deploy
  SERVER_LINUX_DEPLOY_DIR: vnts2.0服务端开发包/linux-deploy
  CLIENT_FLUTTER_VERSION: 3.44.2
  CONSOLE_FLUTTER_VERSION: 3.44.2
  RUST_VERSION: 1.88.0

jobs:
  meta:
    name: 准备版本信息
    runs-on: ubuntu-latest
    outputs:
      client_version: ${{ steps.versions.outputs.client_version }}
      client_build_number: ${{ steps.versions.outputs.client_build_number }}
      server_version: ${{ steps.versions.outputs.server_version }}
      release_version: ${{ steps.versions.outputs.release_version }}
      publish_release: ${{ steps.versions.outputs.publish_release }}
    steps:
      - uses: actions/checkout@v4

      - name: 计算版本
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          input_version="${{ github.event.inputs.release_version || '' }}"
          client_pubspec_version="$(grep '^version:' "${CLIENT_APP_DIR}/pubspec.yaml" | awk '{print $2}' | cut -d+ -f1)"
          server_cargo_version="$(grep '^version = ' "${SERVER_SOURCE_DIR}/Cargo.toml" | head -1 | cut -d '"' -f2)"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${input_version}" ]]; then
            release_version="${input_version}"
          else
            release_version=""
          fi

          if [[ -n "${release_version}" ]]; then
            client_version="${release_version}"
            server_version="${release_version}"
            publish_release="true"
          else
            client_version="${client_pubspec_version}"
            server_version="${server_cargo_version}"
            publish_release="false"
          fi

          for version_name in client_version server_version; do
            version_value="${!version_name}"
            if ! [[ "${version_value}" =~ ^[0-9]+(\.[0-9]+){1,3}$ ]]; then
              echo "版本号格式不正确: ${version_value}" >&2
              exit 1
            fi
          done

          IFS='.' read -r major minor patch build <<< "${client_version}"
          minor="${minor:-0}"
          patch="${patch:-0}"
          build="${build:-0}"
          client_build_number=$((10#$major * 1000000 + 10#$minor * 10000 + 10#$patch * 100 + 10#$build))

          echo "client_version=${client_version}" >> "${GITHUB_OUTPUT}"
          echo "client_build_number=${client_build_number}" >> "${GITHUB_OUTPUT}"
          echo "server_version=${server_version}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${publish_release}" >> "${GITHUB_OUTPUT}"

  build-client-windows:
    name: Windows 客户端
    needs: meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.CLIENT_FLUTTER_VERSION }}

      - name: 设置 Rust
        shell: bash
        run: |
          rustup set auto-self-update disable
          rustup toolchain install "${RUST_VERSION}"
          rustup default "${RUST_VERSION}"
          rustup component add rust-src --toolchain "${RUST_VERSION}"
          rustc -V

      - name: 判断是否已应用 Windows 7 引擎
        id: win7_engine
        shell: pwsh
        run: |
          $flag = "C:/hostedtoolcache/windows/flutter/stable-${{ env.CLIENT_FLUTTER_VERSION }}-x64/.win7_engine_applied"
          if (Test-Path $flag) {
            "applied=true" >> $Env:GITHUB_OUTPUT
          } else {
            "applied=false" >> $Env:GITHUB_OUTPUT
          }

      - name: 替换 Flutter 引擎为支持 Windows 7 的版本
        if: steps.win7_engine.outputs.applied != 'true'
        shell: pwsh
        run: |
          flutter doctor -v
          flutter precache --windows

          $archive = Join-Path $Env:GITHUB_WORKSPACE "VntcApp1.0/.github/patches/windows-x64-release.zip"
          if (Test-Path $archive) {
            Expand-Archive -Path $archive -DestinationPath "windows-x64-release" -Force
            Copy-Item -Path "windows-x64-release/*" -Destination "C:/hostedtoolcache/windows/flutter/stable-${{ env.CLIENT_FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/" -Recurse -Force
            New-Item -ItemType File -Path "C:/hostedtoolcache/windows/flutter/stable-${{ env.CLIENT_FLUTTER_VERSION }}-x64/.win7_engine_applied" -Force | Out-Null
          } else {
            Write-Host "未找到 Windows 7 引擎补丁包，跳过引擎替换: $archive"
          }

      - name: 打补丁以启用 Dropdown Menu 过滤支持
        if: steps.win7_engine.outputs.applied != 'true'
        shell: bash
        run: |
          set -euo pipefail
          patch_file="${GITHUB_WORKSPACE}/VntcApp1.0/vntcrustdesk-src/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if [ -f "$patch_file" ]; then
            cp "$patch_file" "$(dirname "$(dirname "$(which flutter)")")"
            cd "$(dirname "$(dirname "$(which flutter)")")"
            git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || true
          else
            echo "未找到 Dropdown Menu 补丁，跳过: $patch_file"
          fi

      - name: 构建 Windows 客户端
        shell: pwsh
        working-directory: VntcApp1.0
        run: |
          flutter pub get
          flutter build windows --release -v `
            --build-name "${{ needs.meta.outputs.client_version }}" `
            --build-number "${{ needs.meta.outputs.client_build_number }}" `
            "--dart-define=APP_BASE_TITLE=VNTC APP2.0" `
            "--dart-define=APP_BUILD_VERSION=${{ needs.meta.outputs.client_version }}" `
            "--dart-define=APP_DISPLAY_VERSION=v${{ needs.meta.outputs.client_version }}" `
            "--dart-define=APP_PRODUCT_NAME=VNTC APP2.0" `
            "--dart-define=APP_WINDOW_TITLE=VNTC APP2.0 v${{ needs.meta.outputs.client_version }}"

          $artifactDir = Join-Path $Env:GITHUB_WORKSPACE 'artifacts'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $releaseDir = Join-Path (Get-Location) 'build\windows\x64\runner\Release'
          $zipName = "vntapp-client-${{ needs.meta.outputs.client_version }}-windows-x64.zip"
          $zipPath = Join-Path $artifactDir $zipName
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $releaseDir '*') -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath "$zipPath.sha256" -Value "$hash  $zipName" -Encoding Ascii

      - name: 上传 Windows 客户端产物
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: artifacts/*
          if-no-files-found: error

  build-client-macos:
    name: macOS 客户端
    needs: meta
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.CLIENT_FLUTTER_VERSION }}

      - name: 设置 Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup set auto-self-update disable
          rustup toolchain install "${RUST_VERSION}"
          rustup default "${RUST_VERSION}"
          rustup component add rust-src --toolchain "${RUST_VERSION}"
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
          rustc -V

      - name: 修复 tun-rs 代码
        shell: bash
        working-directory: VntcApp1.0
        run: |
          set -euo pipefail
          cd rust
          cargo fetch || true
          cd ..

          TUN_FILE="vendor/tun-rs-2.5.7/src/platform/macos/tap/mod.rs"
          if [ ! -f "$TUN_FILE" ]; then
            TUN_FILE="$(find ~/.cargo/registry/src -name "mod.rs" -path "*/tun-rs-*/src/platform/macos/tap/mod.rs" 2>/dev/null | head -1)"
          fi
          if [ -n "$TUN_FILE" ] && [ -f "$TUN_FILE" ]; then
            python3 - "$TUN_FILE" <<'PY'
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          text = path.read_text()
          line = "use std::mem::size_of;"
          if line not in text:
              marker = "use std::io::{IoSlice, IoSliceMut};"
              text = text.replace(marker, f"{marker}\n{line}", 1)
              path.write_text(text)
          PY
          fi

      - name: 构建 macOS 客户端
        shell: bash
        working-directory: VntcApp1.0
        run: |
          set -euo pipefail
          flutter pub get

          python3 - <<'PY'
          import os
          import shutil
          from pathlib import Path

          candidates = []
          if os.environ.get("PUB_CACHE"):
              candidates.append(Path(os.environ["PUB_CACHE"]))
          candidates.append(Path.home() / ".pub-cache")
          flutter_bin = shutil.which("flutter")
          if flutter_bin:
              candidates.append(Path(flutter_bin).resolve().parents[1] / ".pub-cache")

          header_glob = "hosted/pub.dev/video_player_avfoundation-*/darwin/video_player_avfoundation/Sources/video_player_avfoundation_objc/include/video_player_avfoundation_objc/FVPViewProvider.h"
          for pub_cache in dict.fromkeys(candidates):
              for header in pub_cache.glob(header_glob):
                  text = header.read_text()
                  if "#import <TargetConditionals.h>" not in text:
                      header.write_text(text.replace("#if TARGET_OS_OSX", "#import <TargetConditionals.h>\n\n#if TARGET_OS_OSX", 1))
          PY

          flutter build macos --release -v \
            --build-name "${{ needs.meta.outputs.client_version }}" \
            --build-number "${{ needs.meta.outputs.client_build_number }}" \
            --dart-define=APP_BASE_TITLE="VNTC APP2.0" \
            --dart-define=APP_BUILD_VERSION="${{ needs.meta.outputs.client_version }}" \
            --dart-define=APP_DISPLAY_VERSION="v${{ needs.meta.outputs.client_version }}" \
            --dart-define=APP_PRODUCT_NAME="VNTC APP2.0" \
            --dart-define=APP_WINDOW_TITLE="VNTC APP2.0 v${{ needs.meta.outputs.client_version }}"

          APP_PATH="build/macos/Build/Products/Release/vnt_app.app"
          DMG_PATH="vnt_APP.dmg"
          chmod +x "$APP_PATH/Contents/MacOS/vnt_app"
          codesign --force --deep --timestamp=none --preserve-metadata=identifier,entitlements,flags --sign - "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"
          chmod +x macos/create_dmg.sh
          bash macos/create_dmg.sh "$APP_PATH" "$DMG_PATH"

          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          final_name="vntapp-client-${{ needs.meta.outputs.client_version }}-macos.dmg"
          cp "$DMG_PATH" "$GITHUB_WORKSPACE/artifacts/$final_name"
          shasum -a 256 "$GITHUB_WORKSPACE/artifacts/$final_name" | awk '{print $1 "  '"$final_name"'"}' > "$GITHUB_WORKSPACE/artifacts/$final_name.sha256"

      - name: 上传 macOS 客户端产物
        uses: actions/upload-artifact@v4
        with:
          name: client-macos
          path: artifacts/*
          if-no-files-found: error

  build-server-windows-light:
    name: Windows 服务端轻量版
    needs: meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Rust
        shell: pwsh
        run: |
          rustup set auto-self-update disable
          rustup toolchain install "${Env:RUST_VERSION}"
          rustup default "${Env:RUST_VERSION}"
          rustc -V

      - name: 构建服务端二进制
        shell: pwsh
        run: |
          cargo build --manifest-path '.\vnts2.0服务端开发包\official-vnts-source-2.0.0\Cargo.toml' --release --locked

      - name: 构建轻量原生管理器
        shell: pwsh
        run: |
          & '.\vnts2.0服务端开发包\windows-deploy\build-vnts2-manager-exe.ps1'

      - name: 生成轻量版发布包
        shell: pwsh
        run: |
          & '.\vnts2.0服务端开发包\windows-deploy\build-vnts2-windows-package.ps1' `
            -Version '${{ needs.meta.outputs.server_version }}'

      - name: 上传轻量版服务端产物
        uses: actions/upload-artifact@v4
        with:
          name: server-windows-light
          path: |
            vnts2.0服务端开发包/windows-deploy/dist/vnts2-${{ needs.meta.outputs.server_version }}-windows-x64.zip
            vnts2.0服务端开发包/windows-deploy/dist/vnts2-${{ needs.meta.outputs.server_version }}-windows-x64.zip.sha256
          if-no-files-found: error

  build-server-windows-console:
    name: Windows 服务端增强版
    needs: meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.CONSOLE_FLUTTER_VERSION }}

      - name: 设置 Rust
        shell: pwsh
        run: |
          rustup set auto-self-update disable
          rustup toolchain install "${Env:RUST_VERSION}"
          rustup default "${Env:RUST_VERSION}"
          rustc -V

      - name: 构建服务端二进制
        shell: pwsh
        run: |
          cargo build --manifest-path '.\vnts2.0服务端开发包\official-vnts-source-2.0.0\Cargo.toml' --release --locked

      - name: 生成增强版发布包
        shell: pwsh
        run: |
          & '.\vnts2.0服务端开发包\windows-deploy\build-vnts2-console-package.ps1' `
            -Version '${{ needs.meta.outputs.server_version }}' `
            -FlutterExecutable 'flutter'

      - name: 上传增强版服务端产物
        uses: actions/upload-artifact@v4
        with:
          name: server-windows-console
          path: |
            vnts2.0服务端开发包/windows-deploy/dist/vnts2-console-${{ needs.meta.outputs.server_version }}-windows-x64.zip
            vnts2.0服务端开发包/windows-deploy/dist/vnts2-console-${{ needs.meta.outputs.server_version }}-windows-x64.zip.sha256
          if-no-files-found: error

  build-server-linux:
    name: Linux 服务端
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup set auto-self-update disable
          rustup toolchain install "${RUST_VERSION}"
          rustup default "${RUST_VERSION}"
          rustc -V

      - name: 生成 Linux 发布包
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "${SERVER_LINUX_DEPLOY_DIR}/build-vnts2-linux-package.sh"
          VNTS2_VERSION="${{ needs.meta.outputs.server_version }}" "${SERVER_LINUX_DEPLOY_DIR}/build-vnts2-linux-package.sh"

      - name: 上传 Linux 服务端产物
        uses: actions/upload-artifact@v4
        with:
          name: server-linux
          path: |
            vnts2.0服务端开发包/dist/vnts2-${{ needs.meta.outputs.server_version }}-linux-x86_64.tar.gz
            vnts2.0服务端开发包/dist/vnts2-${{ needs.meta.outputs.server_version }}-linux-x86_64.tar.gz.sha256
          if-no-files-found: error

  deploy:
    name: 发布 GitHub Release
    if: needs.meta.outputs.publish_release == 'true'
    needs:
      - meta
      - build-client-windows
      - build-client-macos
      - build-server-windows-light
      - build-server-windows-console
      - build-server-linux
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 汇总发布文件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find ./artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/$(basename "$file")"
          done

          cd release-assets
          sha256sum * > SHA256SUMS.txt
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone

          repo = os.environ["GITHUB_REPOSITORY"]
          version = os.environ["RELEASE_VERSION"]
          tag = f"v{version}"

          def platform_for(name: str) -> str:
              lower = name.lower()
              if lower.endswith(".dmg"):
                  return "macos"
              if lower.endswith(".tar.gz"):
                  return "linux"
              if lower.endswith(".zip"):
                  return "windows"
              return "unknown"

          assets = []
          for name in sorted(os.listdir(".")):
              if name in {"SHA256SUMS.txt", "latest.json"}:
                  continue
              if not os.path.isfile(name):
                  continue
              with open(name, "rb") as handle:
                  sha256 = hashlib.sha256(handle.read()).hexdigest()
              assets.append(
                  {
                      "name": name,
                      "platform": platform_for(name),
                      "size": os.path.getsize(name),
                      "sha256": sha256,
                      "download_url": f"https://github.com/{repo}/releases/download/{tag}/{name}",
                  }
              )

          manifest = {
              "version": version,
              "tag": tag,
              "published_at": datetime.now(timezone.utc).isoformat(),
              "release_url": f"https://github.com/{repo}/releases/tag/{tag}",
              "assets": assets,
          }
          with open("latest.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, ensure_ascii=False, indent=2)
          PY
        env:
          RELEASE_VERSION: ${{ needs.meta.outputs.release_version }}

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.meta.outputs.release_version }}
          name: VNT Suite v${{ needs.meta.outputs.release_version }}
          body: |
            自动构建发布：

            - Windows 客户端
            - macOS 客户端
            - Windows 服务端轻量版
            - Windows 服务端增强版
            - Linux 服务端
          files: release-assets/*
          prerelease: ${{ contains(needs.meta.outputs.release_version, 'test') || contains(needs.meta.outputs.release_version, 'beta') || contains(needs.meta.outputs.release_version, 'rc') }}
